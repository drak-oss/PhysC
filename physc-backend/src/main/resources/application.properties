spring.application.name=physc-backend

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/physc_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:mypassword123}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET:change-me-in-production}
app.jwt.expiry-ms=604800000

server.port=${PORT:8080}
